version: "2"
run:
  timeout: 5m
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - misspell
    - gofmt
    - goimports
    - revive
  settings:
    revive:
      rules:
        - name: exported
          arguments: ["disableStutteringCheck"]
issues:
  exclude-dirs:
    - dist
