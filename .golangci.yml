version: "2"
run:
  timeout: 5m
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*net/http.Response).Body.Close
formatters:
  enable:
    - gofmt
    - goimports
issues:
  exclude-dirs:
    - dist
